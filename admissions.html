<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admissions Form</title>
  
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-orange-500 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-5xl bg-white rounded-3xl shadow-2xl p-6 md:p-10">
    <div class="bg-gray-100 rounded-2xl p-5 md:p-8">
      
     
      <h1 class="text-2xl md:text-5xl font-light text-center text-gray-800 mb-6 tracking-wide">
        ADMISSIONS - 2026 OPEN NOW
      </h1>

    
      <form class="space-y-5">

       
        <div>
          <input 
            type="text" 
            placeholder="Enter Name *"
            class="w-full bg-white rounded-lg px-4 py-4 text-lg border border-gray-200 focus:outline-none focus:ring-0 focus:border-indigo-700 border-b-4 border-b-indigo-900"
          />
        </div>

        
        <div>
          <input 
            type="email" 
            placeholder="Enter Email Address *"
            class="w-full bg-white rounded-lg px-4 py-4 text-lg border border-gray-200 focus:outline-none focus:ring-0 focus:border-indigo-700 border-b-4 border-b-indigo-900"
          />
        </div>

        <div class="flex flex-col sm:flex-row gap-3">
          <select class="w-full sm:w-28 bg-white rounded-lg px-3 py-4 text-lg border border-gray-200 focus:outline-none border-b-4 border-b-indigo-900">
            <option>+91</option>
            <option>+1</option>
            <option>+44</option>
          </select>

          <input 
            type="tel" 
            placeholder="Enter Mobile Number *"
            class="flex-1 bg-white rounded-lg px-4 py-4 text-lg border border-gray-200 focus:outline-none border-b-4 border-b-indigo-900"
          />
        </div>

       
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <select class="w-full bg-white rounded-lg px-4 py-4 text-lg border border-gray-200 focus:outline-none border-b-4 border-b-indigo-900">
            <option>Select State *</option>
            <option>Karnataka</option>
            <option>Tamil Nadu</option>
            <option>Kerala</option>
          </select>

          <select class="w-full bg-white rounded-lg px-4 py-4 text-lg border border-gray-200 focus:outline-none border-b-4 border-b-indigo-900">
            <option>Select City *</option>
            <option>Bengaluru</option>
            <option>Mysuru</option>
            <option>Mangaluru</option>
          </select>
        </div>

     
        <div>
          <select class="w-full bg-white rounded-lg px-4 py-4 text-lg border border-gray-200 focus:outline-none border-b-4 border-b-indigo-900">
            <option>Select Program *</option>
            <option>B.E</option>
            <option>MBA</option>
            <option>MCA</option>
          </select>
        </div>

       
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex items-center justify-between bg-white rounded-lg border border-gray-200 border-b-4 border-b-indigo-900 px-4 py-3">
            <span class="text-3xl font-semibold tracking-widest text-black select-none">
              
            </span>
            <button type="button" class="text-2xl text-gray-700 hover:text-indigo-900">
              ↻
            </button>
          </div>

          <input 
            type="text" 
            placeholder="Enter Captcha"
            class="w-full bg-white rounded-lg px-4 py-4 text-lg border border-gray-200 focus:outline-none border-b-4 border-b-indigo-900"
          />
        </div>

        <!-- Checkbox -->
        <div class="flex items-start gap-3 pt-2">
          <input type="checkbox" class="w-5 h-5 mt-1 accent-indigo-900" />
          <p class="text-sm md:text-base text-gray-800 leading-relaxed">
            I agree to receive information regarding my submitted enquiry on 
            <span class="font-semibold">VTU Institute of Technology Chintamani</span>
          </p>
        </div>

        <!-- Submit Button -->
        <div class="pt-4">
          <button 
            type="submit"
            class="w-full md:w-auto bg-indigo-900 hover:bg-indigo-800 text-white px-8 py-4 rounded-xl text-lg font-semibold transition duration-300"
          >
            Submit Application
          </button>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
